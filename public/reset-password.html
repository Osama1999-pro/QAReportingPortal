<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QA Portal — Reset Password</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="auth-shell">
  <div class="auth-card">
    <div class="auth-title">Choose a new password</div>
    <div class="auth-sub">Must be at least 8 characters.</div>
    <div class="auth-error" id="formError"></div>

    <form id="resetForm">
      <div class="field">
        <label for="newPassword">New password</label>
        <input type="password" id="newPassword" required minlength="8" placeholder="••••••••">
      </div>
      <div class="field">
        <label for="confirmPassword">Confirm new password</label>
        <input type="password" id="confirmPassword" required minlength="8" placeholder="••••••••">
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;" id="submitBtn">Reset password</button>
    </form>
  </div>
</div>

<script src="/js/api.js"></script>
<script src="/js/reset-password.js"></script>
</body>
</html>
