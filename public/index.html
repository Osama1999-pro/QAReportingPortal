<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QA Portal — Log in</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="auth-shell">
  <div class="auth-card">
    <div class="auth-brand">
      <div class="brand-mark" style="width:36px;height:36px;background:conic-gradient(var(--teal) 0turn,var(--teal) 0.82turn,var(--border-soft) 0.82turn);border-radius:50%;position:relative;display:flex;align-items:center;justify-content:center;">
        <div style="position:absolute;inset:4px;border-radius:50%;background:var(--ink-2);"></div>
        <span style="position:relative;z-index:1;font-family:var(--display);font-weight:700;font-size:12px;color:#fff;">QA</span>
      </div>
      <div>
        <div style="font-family:var(--display);font-weight:700;font-size:16px;">QA Portal</div>
        <div style="font-size:11px;color:var(--text-faint);">Customer Service QA Management</div>
      </div>
    </div>

    <div class="auth-title">Welcome back</div>
    <div class="auth-sub">Log in to view your evaluations, coaching, and reports.</div>

    <div class="auth-error" id="loginError"></div>

    <form id="loginForm">
      <div class="field">
        <label for="email">Work email</label>
        <input type="email" id="email" required autocomplete="username" placeholder="you@company.com">
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" required autocomplete="current-password" placeholder="••••••••">
      </div>
      <div class="flex-between" style="margin-bottom:16px;">
        <label class="flex-gap" style="font-size:12.5px;color:var(--text-mute);cursor:pointer;">
          <input type="checkbox" id="rememberMe" style="margin-right:6px;"> Remember me
        </label>
        <a href="/forgot-password.html" style="font-size:12.5px;font-weight:600;color:var(--teal-deep);">Forgot password?</a>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;" id="loginBtn">Log in</button>
    </form>

    <div class="auth-note">Demo credentials (change immediately after first login): <strong>admin@qaportal.test</strong> / <strong>Password123!</strong></div>
  </div>
</div>

<script src="/js/api.js"></script>
<script src="/js/login.js"></script>
</body>
</html>
