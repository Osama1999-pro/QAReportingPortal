<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QA Portal — Forgot Password</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="auth-shell">
  <div class="auth-card">
    <div class="auth-title">Reset your password</div>
    <div class="auth-sub">Enter your work email and we'll send you a reset link. It expires in 15 minutes.</div>
    <div class="auth-error" id="formError"></div>
    <div id="successMsg" style="display:none;" class="auth-note">If that email exists in our system, a reset link has been sent. Check your inbox.</div>

    <form id="forgotForm">
      <div class="field">
        <label for="email">Work email</label>
        <input type="email" id="email" required placeholder="you@company.com">
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;" id="submitBtn">Send reset link</button>
    </form>
    <div class="auth-links" style="justify-content:center;margin-top:16px;">
      <a href="/index.html">&larr; Back to log in</a>
    </div>
  </div>
</div>

<script src="/js/api.js"></script>
<script src="/js/forgot-password.js"></script>
</body>
</html>
